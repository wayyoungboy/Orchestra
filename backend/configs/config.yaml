server:
  http_addr: ":8080"

terminal:
  max_sessions: 32
  idle_timeout: 30m

security:
  encryption_key: ""
  allowed_commands:
    - /bin/bash
    - /bin/zsh
    - /usr/bin/env
    - claude
    - gemini
    - codex
    - qwen
    - aider
    - cursor-agent
  allowed_paths:
    - ~/projects
    - ~/code
    - "~"
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://localhost:5174"
    - "http://localhost:5175"
    - "http://127.0.0.1:3000"
    - "http://127.0.0.1:5173"
    - "http://127.0.0.1:5174"
    - "http://127.0.0.1:5175"

# Auth configuration
# Set ORCHESTRA_JWT_SECRET env var to enable authentication
# Set ORCHESTRA_AUTH_DISABLED=true to disable auth for testing
auth:
  enabled: false
  jwt_secret: ""
  jwt_expiration: 24h
  allow_registration: false

storage:
  database: "./data/orchestra.db"
  workspaces: "./workspaces"