name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:
  workflow_dispatch:
    inputs:
      focused_e2e:
        description: 'Run the full focused browser MVP E2E gate'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install tmux
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Verify MVP gate
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.focused_e2e) }}
        run: make verify

      - name: Verify focused browser MVP gate
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.focused_e2e }}
        run: |
          CHROME_PATH="$(command -v google-chrome || command -v chromium || command -v chromium-browser || true)"
          if [[ -z "$CHROME_PATH" ]]; then
            echo "No system Chrome/Chromium executable found on the runner." >&2
            exit 1
          fi
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH="$CHROME_PATH" make verify-focused
